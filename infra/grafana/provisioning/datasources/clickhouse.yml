apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: false
    jsonData:
      defaultDatabase: analytics
      host: clickhouse
      port: 9000
      protocol: native
      secure: false
      username: analytics
    secureJsonData:
      password: "analytics"
